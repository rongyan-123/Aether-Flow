version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: xiuxian-postgres
    restart: always
    environment:
      POSTGRES_DB: xiuxian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma
    container_name: xiuxian-chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
      - ./server/models:/models
    environment:
      - IS_PERSISTENT=TRUE

  app:
    build: .
    container_name: xiuxian-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/xiuxian?schema=public
      CHROMA_URL: http://chroma:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
